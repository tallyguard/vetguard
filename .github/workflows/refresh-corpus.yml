name: Refresh popular-package corpus

# Monthly regeneration of the bundled npm-high-impact corpus. When the name list
# actually changes it pushes a branch and opens a PR (never direct-pushes to
# main), so a stale corpus (a documented false-positive risk) cannot silently
# drift. The refresh PR flows through the normal gate, including the accuracy eval.
#
# Note: if the org disallows Actions from creating PRs, the PR step falls back to
# pushing the branch and printing a one-click compare link. Enable the org-level
# "Allow GitHub Actions to create and approve pull requests" setting for fully
# automated refresh PRs.
on:
  schedule:
    - cron: "0 4 1 * *" # 1st of each month, 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Regenerate the corpus
        run: npm run refresh:popular
      - name: Open a PR when the corpus changed
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          data="src/ecosystems/npm/data/popular-packages.ts"
          # A timestamp-only diff is not a corpus change (refresh restamps generatedAt).
          meaningful=$(git diff -U0 -- "$data" | grep -E '^[+-]' | grep -vE '^(\+\+\+|---)' | grep -v 'generatedAt' || true)
          if [ -z "$meaningful" ]; then
            echo "corpus content unchanged (only the timestamp); nothing to do"
            exit 0
          fi
          branch="chore/refresh-corpus-$(date -u +%Y%m%d)-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add "$data"
          git commit -m "Refresh popular-package corpus"
          git push -u origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "Refresh popular-package corpus" \
            --body "Automated monthly corpus refresh (data only). The gate, including the accuracy eval, runs before merge." \
            || echo "Auto-PR blocked (org policy). Open it: https://github.com/${REPO}/compare/main...${branch}?expand=1"
